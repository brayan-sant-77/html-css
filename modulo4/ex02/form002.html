<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.js" method="post" autocomplete="on"> <!--Usamos o post quando se trata de dados mais sensíveis tipo senhas, ou informações confidenciais-->
        <p>
            <!-- 
            O elemento <label> serve para associar um texto descritivo a um campo de formulário.
            Neste caso, o atributo 'for="iusu"' vincula este label ao elemento com id "iusu",
            melhorando a acessibilidade e permitindo que o usuário clique no texto "Usuário: " 
            para focar no campo de entrada correspondente.
            -->
            <label for="iusu">Usuário: </label>
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="10" placeholder="Nome do Usuário" autocomplete="username">
        </p>
        <p>
            <label for="isen">Senha: </label>
            <input type="password" name="sen" id="isen" required minlength="5" maxlength="20" autocomplete="current-password">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
